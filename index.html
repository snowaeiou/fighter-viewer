<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Fighter Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      font-family: 'Courier New', monospace;
      color: #eee;
      /* dvh = dynamic viewport height, shrinks when browser chrome appears */
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 8px 16px 5px;
      text-align: center;
      background: #0d0d1a;
      border-bottom: 1px solid #1e1e3a;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 0.95rem;
      letter-spacing: 6px;
      color: #e94560;
      text-shadow: 0 0 8px #e94560;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
      min-height: 0;
    }

    canvas { display: block; width: 100%; height: 100%; }

    /* ── Pose bar ── */
    #pose-bar {
      display: flex;
      gap: 6px;
      padding: 7px 10px;
      /* safe-area-inset-bottom keeps buttons above iOS home indicator */
      padding-bottom: max(7px, env(safe-area-inset-bottom, 7px));
      overflow-x: auto;
      flex-shrink: 0;
      background: #0d0d1a;
      border-top: 1px solid #1e1e3a;
      justify-content: center;
      flex-wrap: wrap;
      /* hide scrollbar */
      scrollbar-width: none;
    }
    #pose-bar::-webkit-scrollbar { display: none; }

    .pose-btn {
      background: #16213e;
      border: 1.5px solid #e94560;
      color: #e94560;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 1px;
      padding: 5px 11px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
      touch-action: manipulation;
    }
    .pose-btn:hover, .pose-btn.active { background: #e94560; color: #fff; }

    .pose-btn[data-type="action"] { border-color: #ffaa00; color: #ffaa00; }
    .pose-btn[data-type="action"]:hover,
    .pose-btn[data-type="action"].active { background: #ffaa00; color: #111; }

    #hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      color: #444;
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="header"><h1>FIGHTER VIEWER</h1></div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="hint">🖱 Drag to rotate · Scroll / Pinch to zoom</div>
</div>

<div id="pose-bar">
  <button class="pose-btn active" data-pose="idle"     data-type="stance">Idle</button>
  <button class="pose-btn"        data-pose="guard"    data-type="stance">Guard</button>
  <button class="pose-btn"        data-pose="crouch"   data-type="stance">Crouch</button>
  <button class="pose-btn"        data-pose="punch"    data-type="action">⚡ Punch</button>
  <button class="pose-btn"        data-pose="kick"     data-type="action">⚡ Kick</button>
  <button class="pose-btn"        data-pose="uppercut" data-type="action">⚡ Uppercut</button>
  <button class="pose-btn"        data-pose="jump"     data-type="action">⚡ Jump</button>
  <button class="pose-btn"        data-pose="hadouken" data-type="action">⚡ Hadouken</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ─── Scene ────────────────────────────────────────────────────
const wrap     = document.getElementById('canvas-wrap');
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d1a);
scene.fog = new THREE.Fog(0x0d0d1a, 14, 22);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);

// ─── Lights ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x223366, 1.2));

const keyLight = new THREE.DirectionalLight(0xffffff, 2.8);
keyLight.position.set(3, 7, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0xe94560, 1.4);
rimLight.position.set(-4, 4, -3);
scene.add(rimLight);

const fillLight = new THREE.DirectionalLight(0x4466ff, 0.7);
fillLight.position.set(0, -2, 5);
scene.add(fillLight);

// ─── Ground ───────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(3, 64),
  new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const ring = new THREE.Mesh(
  new THREE.RingGeometry(2.95, 3.05, 64),
  new THREE.MeshBasicMaterial({ color: 0xe94560, side: THREE.DoubleSide })
);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.001;
scene.add(ring);

// ─── Materials ─────────────────────────────────────────────────
const M = {
  body: new THREE.MeshStandardMaterial({ color: 0x2255cc, roughness: 0.45, metalness: 0.3 }),
  head: new THREE.MeshStandardMaterial({ color: 0xf5c5a0, roughness: 0.6 }),
  limb: new THREE.MeshStandardMaterial({ color: 0x1a44aa, roughness: 0.5, metalness: 0.2 }),
  hand: new THREE.MeshStandardMaterial({ color: 0xf5c5a0, roughness: 0.6 }),
  shoe: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 }),
  belt: new THREE.MeshStandardMaterial({ color: 0xe94560, roughness: 0.4, metalness: 0.5 }),
};

function box(w, h, d, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.castShadow = true;
  return m;
}

// ─── Skeleton ─────────────────────────────────────────────────
//
// Rotation convention (Three.js right-hand, Y-up, character faces +Z):
//   rotX > 0 → limb swings FORWARD  (+Z)
//   rotX < 0 → limb swings BACKWARD (-Z)
//   Elbow/knee natural bend = foreArm/shin rotX < 0
//   (because the distal segment rotates "back" relative to the proximal segment)
//
const root = new THREE.Group();
scene.add(root);

function jnt(name) { const g = new THREE.Group(); g.name = name; return g; }

// Hips (world Y = character waist height)
const hips = jnt('hips');
hips.position.y = 1.0;
root.add(hips);

// Torso
const torsoJoint = jnt('torsoJoint');
hips.add(torsoJoint);
const torsoMesh = box(0.55, 0.65, 0.28, M.body);
torsoMesh.position.y = 0.325;
torsoJoint.add(torsoMesh);
const beltMesh = box(0.57, 0.07, 0.30, M.belt);
beltMesh.position.y = 0.04;
torsoJoint.add(beltMesh);

// Neck + Head
const neck = jnt('neck');
neck.position.y = 0.66;
torsoJoint.add(neck);
const neckMesh = box(0.14, 0.12, 0.14, M.head);
neckMesh.position.y = 0.06;
neck.add(neckMesh);

const headJoint = jnt('head');
headJoint.position.y = 0.14;
neck.add(headJoint);
const headMesh = box(0.32, 0.35, 0.28, M.head);
headMesh.position.y = 0.175;
headJoint.add(headMesh);
[-0.08, 0.08].forEach(x => {
  const eye = box(0.055, 0.04, 0.01, new THREE.MeshStandardMaterial({ color: 0x111122 }));
  eye.position.set(x, 0.22, 0.145);
  headJoint.add(eye);
});

// Arms
function makeArm(side) {
  const s = side === 'L' ? -1 : 1;
  const sh = jnt(`${side}_shoulder`);
  sh.position.set(s * 0.32, 0.56, 0);
  torsoJoint.add(sh);

  const ua = jnt(`${side}_upperArm`);
  sh.add(ua);
  const uaMesh = box(0.13, 0.34, 0.13, M.limb);
  uaMesh.position.y = -0.17;
  ua.add(uaMesh);

  const fa = jnt(`${side}_foreArm`);
  fa.position.y = -0.34;   // = elbow pivot
  ua.add(fa);
  const faMesh = box(0.11, 0.30, 0.11, M.limb);
  faMesh.position.y = -0.15;
  fa.add(faMesh);

  const ha = jnt(`${side}_hand`);
  ha.position.y = -0.30;
  fa.add(ha);
  const haMesh = box(0.13, 0.14, 0.10, M.hand);
  haMesh.position.y = -0.07;
  ha.add(haMesh);
}
makeArm('L'); makeArm('R');

// Legs
function makeLeg(side) {
  const s = side === 'L' ? -1 : 1;
  const hip = jnt(`${side}_hip`);
  hip.position.set(s * 0.16, 0, 0);
  hips.add(hip);

  const th = jnt(`${side}_thigh`);
  hip.add(th);
  const thMesh = box(0.19, 0.42, 0.19, M.limb);
  thMesh.position.y = -0.21;
  th.add(thMesh);

  const sh = jnt(`${side}_shin`);
  sh.position.y = -0.42;   // = knee pivot
  th.add(sh);
  const shMesh = box(0.15, 0.40, 0.15, M.limb);
  shMesh.position.y = -0.20;
  sh.add(shMesh);

  const fo = jnt(`${side}_foot`);
  fo.position.y = -0.40;
  sh.add(fo);
  const foMesh = box(0.16, 0.10, 0.26, M.shoe);
  foMesh.position.set(0, -0.05, 0.07);
  fo.add(foMesh);
}
makeLeg('L'); makeLeg('R');

// ─── Joint map ────────────────────────────────────────────────
const joints = {};
root.traverse(o => { if (o.name) joints[o.name] = o; });

// ─── Poses ────────────────────────────────────────────────────
//
// Values in DEGREES.  rotX: +forward / -backward
// Elbow bend     = foreArm  rotX < 0  (shin curls toward upper arm)
// Knee bend      = shin     rotX < 0  (lower leg curls backward)
// "Absolute" shin direction = thigh_rotX + shin_rotX (local)
//   e.g. thigh=80°, shin=-90° → absolute=-10° ≈ shin nearly vertical (squat)
//
const POSES = {

  idle: {
    hipsY: 1.0, returnToIdle: false, tweenInSpeed: 4,
    hips:       [ 0,  0, 0], torsoJoint: [ 2,  0, 0], head: [-2,  0, 0],
    L_shoulder: [ 0,  0, 6], L_upperArm: [ 6,  0, 0], L_foreArm: [-12,  0, 0],
    R_shoulder: [ 0,  0,-6], R_upperArm: [ 6,  0, 0], R_foreArm: [-12,  0, 0],
    L_hip:      [ 0,  0, 3], L_thigh:    [ 4,  0, 0], L_shin:    [ -6,  0, 0],
    R_hip:      [ 0,  0,-3], R_thigh:    [ 4,  0, 0], R_shin:    [ -6,  0, 0],
  },

  guard: {
    // Arms raised forward + elbows bent to cover face; slight squat
    hipsY: 0.87, returnToIdle: false, tweenInSpeed: 5,
    hips:       [ 0,  0, 0], torsoJoint: [14,  0, 0], head: [-14,  0, 0],
    L_shoulder: [ 0,  0, 8], L_upperArm: [68,  0, 0], L_foreArm: [-95,  0, 0],
    R_shoulder: [ 0,  0,-8], R_upperArm: [78,  0, 0], R_foreArm: [-105, 0, 0],
    // Thighs slightly forward, knees slightly bent
    L_hip:      [ 0,  0, 4], L_thigh:    [20,  0, 5], L_shin:    [-28,  0, 0],
    R_hip:      [ 0,  0,-4], R_thigh:    [14,  0,-5], R_shin:    [-20,  0, 0],
  },

  crouch: {
    // Deep squat: hips low, thighs ~70° forward, knee bent so shin is near vertical
    // shin absolute ≈ thigh - |shin_local| → 70 - 85 = -15° ≈ straight down ✓
    hipsY: 0.56, returnToIdle: false, tweenInSpeed: 5,
    hips:       [ 0,  0, 0], torsoJoint: [10,  0, 0], head: [-10,  0, 0],
    L_shoulder: [ 0,  0,12], L_upperArm: [35,  0, 0], L_foreArm: [-55,  0, 0],
    R_shoulder: [ 0,  0,-12],R_upperArm: [35,  0, 0], R_foreArm: [-55,  0, 0],
    L_hip:      [ 0,  0, 6], L_thigh:    [72,  0, 8], L_shin:    [-85,  0, 0],
    R_hip:      [ 0,  0,-6], R_thigh:    [72,  0,-8], R_shin:    [-85,  0, 0],
  },

  punch: {
    // Lead (L) arm fully extended forward  → upperArm +88°, foreArm ~0  → arm straight out
    // Rear (R) arm in guard ready         → upperArm +30°, foreArm -90° → fist near face, elbow 90°
    // Body twists on hips for power
    hipsY: 0.93, returnToIdle: true, holdMs: 480, tweenInSpeed: 20,
    hips:       [ 0,-35, 0], torsoJoint: [ 0, 22, 0], head: [ 0,-18,  0],
    L_shoulder: [ 0,  0, 4], L_upperArm: [88,  0, 0], L_foreArm: [ -5,  0, 0],
    R_shoulder: [ 0,  0,-8], R_upperArm: [28,  0, 0], R_foreArm: [-95,  0, 0],
    L_hip:      [ 0,  0, 5], L_thigh:    [18,  0, 6], L_shin:    [-25,  0, 0],
    R_hip:      [ 0,  0,-5], R_thigh:    [ 8,  0,-4], R_shin:    [-12,  0, 0],
  },

  kick: {
    // R leg kicks forward-high: thigh +110° (knee above hip), shin -65° local
    // shin absolute = 110 - 65 = +45° → shin angled forward, extended naturally ✓
    // L leg planted with slight bend for balance
    hipsY: 1.06, returnToIdle: true, holdMs: 530, tweenInSpeed: 18,
    hips:       [ 0, 18, 0], torsoJoint: [-6,  0, 0], head: [ 6,  0,  0],
    L_shoulder: [ 0,  0,28], L_upperArm: [35,  0, 8], L_foreArm: [-30,  0, 0],
    R_shoulder: [ 0,  0,-30],R_upperArm: [-25, 0,-8], R_foreArm: [-20,  0, 0],
    L_hip:      [ 0,  0, 6], L_thigh:    [14,  0, 8], L_shin:    [-20,  0, 0],
    R_hip:      [ 0,  0,-5], R_thigh:    [110, 0,-5], R_shin:    [-65,  0, 0],
  },

  uppercut: {
    // R arm drives upward: upperArm past 90° (→ arm angled up), foreArm slight bend
    // torsoJoint drives the upward thrust with body lean back then snap up
    hipsY: 1.06, returnToIdle: true, holdMs: 460, tweenInSpeed: 22,
    hips:       [ 0,-18, 0], torsoJoint: [-22, 8, 0], head: [18,  0,  0],
    L_shoulder: [ 0,  0, 8], L_upperArm: [42,  0, 0], L_foreArm: [-60,  0, 0],
    R_shoulder: [ 0,  0,-6], R_upperArm: [155, 0, 0], R_foreArm: [-35,  0, 0],
    // R arm at 155° → upper arm points up-and-slightly-forward = natural uppercut arc ✓
    L_hip:      [ 0,  0, 5], L_thigh:    [18,  0, 5], L_shin:    [-24,  0, 0],
    R_hip:      [ 0,  0,-5], R_thigh:    [-6,  0,-3], R_shin:    [  4,  0, 0],
  },

  jump: {
    // Both legs tucked: thigh forward +42°, shin bent back -85° local
    // shin absolute = 42 - 85 = -43° → lower leg curls behind (natural tuck) ✓
    hipsY: 1.58, returnToIdle: true, holdMs: 680, tweenInSpeed: 11,
    hips:       [ 0,  0, 0], torsoJoint: [-8,  0, 0], head: [ 8,  0,  0],
    L_shoulder: [ 0,  0,16], L_upperArm: [-52, 0, 0], L_foreArm: [-38,  0, 0],
    R_shoulder: [ 0,  0,-16],R_upperArm: [-52, 0, 0], R_foreArm: [-38,  0, 0],
    L_hip:      [ 0,  0, 5], L_thigh:    [42,  0, 6], L_shin:    [-85,  0, 0],
    R_hip:      [ 0,  0,-5], R_thigh:    [42,  0,-6], R_shin:    [-85,  0, 0],
  },

  hadouken: {
    // Both arms thrust forward: upperArm +72°, foreArm -18° (nearly straight, hands meeting)
    hipsY: 0.88, returnToIdle: true, holdMs: 620, tweenInSpeed: 15,
    hips:       [ 0,-22, 0], torsoJoint: [ 0, 12, 0], head: [ 0, -8,  0],
    L_shoulder: [ 0,  0, 5], L_upperArm: [72,  0, 0], L_foreArm: [-18,  0, 0],
    R_shoulder: [ 0,  0,-5], R_upperArm: [72,  0, 0], R_foreArm: [-18,  0, 0],
    L_hip:      [ 0,  0, 4], L_thigh:    [22,  0, 6], L_shin:    [-32,  0, 0],
    R_hip:      [ 0,  0,-4], R_thigh:    [12,  0,-5], R_shin:    [-18,  0, 0],
  },
};

// ─── Pose tween ───────────────────────────────────────────────
const DEG = Math.PI / 180;
let fromPose = POSES.idle, toPose = POSES.idle, tweenT = 1, tweenSpeed = 4;
let returnTimer = null;

function lerp(a, b, t) { return a + (b - a) * t; }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
// Elastic-like ease for snappy actions: overshoots slightly then settles
function easeOutBack(t) {
  const c1 = 1.4, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function applyInterp(t, pose) {
  const e = pose.returnToIdle ? easeOutBack(Math.min(t, 1)) : easeOutCubic(t);
  const allKeys = new Set([...Object.keys(fromPose), ...Object.keys(toPose)]);
  for (const key of allKeys) {
    if (['hipsY','returnToIdle','holdMs','tweenInSpeed'].includes(key)) continue;
    const j = joints[key];
    if (!j) continue;
    const from = fromPose[key] || [0,0,0];
    const to   = toPose[key]   || [0,0,0];
    j.rotation.x = lerp(from[0], to[0], e) * DEG;
    j.rotation.y = lerp(from[1], to[1], e) * DEG;
    j.rotation.z = lerp(from[2], to[2], e) * DEG;
  }
  hips.position.y = lerp(fromPose.hipsY ?? 1.0, toPose.hipsY ?? 1.0, e);
}

function captureCurrent() {
  const snap = { hipsY: hips.position.y, returnToIdle: false, tweenInSpeed: 4 };
  for (const key of Object.keys(POSES.idle)) {
    if (['hipsY','returnToIdle','holdMs','tweenInSpeed'].includes(key)) continue;
    const j = joints[key];
    if (j) snap[key] = [j.rotation.x / DEG, j.rotation.y / DEG, j.rotation.z / DEG];
  }
  return snap;
}

function setPose(name) {
  clearTimeout(returnTimer);
  const pose = POSES[name];
  fromPose   = captureCurrent();
  toPose     = pose;
  tweenT     = 0;
  tweenSpeed = pose.tweenInSpeed ?? 5;

  if (pose.returnToIdle) {
    const ms = Math.round(1000 / tweenSpeed) + (pose.holdMs ?? 400);
    returnTimer = setTimeout(() => {
      document.querySelectorAll('.pose-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-pose="idle"]').classList.add('active');
      fromPose   = captureCurrent();
      toPose     = POSES.idle;
      tweenT     = 0;
      tweenSpeed = 5;
    }, ms);
  }
}

// Apply idle immediately
applyInterp(1, POSES.idle);

// ─── Orbit control ────────────────────────────────────────────
let orbitTheta  = 0;
let orbitPhi    = 18 * DEG;
let orbitRadius = 5.5;
const MIN_PHI = -20 * DEG, MAX_PHI = 70 * DEG;
const MIN_R   = 2.5,       MAX_R   = 10;

let dragging = false, lastX = 0, lastY = 0;

wrap.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup',   () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  orbitTheta -= (e.clientX - lastX) * 0.008;
  orbitPhi   += (e.clientY - lastY) * 0.006;  // inverted: drag up → look up
  orbitPhi    = Math.max(MIN_PHI, Math.min(MAX_PHI, orbitPhi));
  lastX = e.clientX; lastY = e.clientY;
});
wrap.addEventListener('wheel', e => {
  orbitRadius = Math.max(MIN_R, Math.min(MAX_R, orbitRadius + e.deltaY * 0.005));
  e.preventDefault();
}, { passive: false });

// Touch
let tLast = null, pinchLast = null;
wrap.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    tLast = { x: e.touches[0].clientX, y: e.touches[0].clientY }; pinchLast = null;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchLast = Math.hypot(dx, dy); tLast = null;
  }
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && tLast) {
    orbitTheta -= (e.touches[0].clientX - tLast.x) * 0.008;
    orbitPhi   += (e.touches[0].clientY - tLast.y) * 0.006;
    orbitPhi    = Math.max(MIN_PHI, Math.min(MAX_PHI, orbitPhi));
    tLast = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2 && pinchLast !== null) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const d  = Math.hypot(dx, dy);
    orbitRadius = Math.max(MIN_R, Math.min(MAX_R, orbitRadius - (d - pinchLast) * 0.02));
    pinchLast = d;
  }
}, { passive: false });

// ─── Resize ───────────────────────────────────────────────────
function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ─── Render loop ──────────────────────────────────────────────
const clock  = new THREE.Clock();
let breathT  = 0;

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();

  // Pose tween
  if (tweenT < 1) {
    tweenT = Math.min(1, tweenT + dt * tweenSpeed);
    applyInterp(tweenT, toPose);
  }

  // Subtle breathing on stances only
  if (tweenT >= 1 && !toPose.returnToIdle) {
    breathT += dt;
    torsoJoint.rotation.x += Math.sin(breathT * 1.4) * 0.010;
  }

  // Camera
  const cx = orbitRadius * Math.sin(orbitTheta) * Math.cos(orbitPhi);
  const cy = orbitRadius * Math.sin(orbitPhi)    + 1.2;
  const cz = orbitRadius * Math.cos(orbitTheta)  * Math.cos(orbitPhi);
  camera.position.set(cx, cy, cz);
  camera.lookAt(0, 1.2, 0);

  renderer.render(scene, camera);
});

// ─── Buttons ──────────────────────────────────────────────────
document.querySelectorAll('.pose-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pose-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setPose(btn.dataset.pose);
  });
});
</script>
